<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="main-wrapper">
        <div class="centered-container">
            <div class="glass-card">
                <div class="brand-header text-center mb-4">
                    <a href="https://www.codestechnology.com/" target="_blank"
                        style="text-decoration: none; color: inherit; display: inline-block; position: relative; z-index: 10;">
                        <h2><img src="{{ url_for('static', filename='img/icon.png') }}" alt="Prisma Logo" class="me-2"
                                style="height: 36px; vertical-align: middle;">Prisma</h2>
                    </a>
                    <p class="text-muted">Combine text & files into one professional document</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show"
                    role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form id="unifiedForm" enctype="multipart/form-data">

                    <!-- 1. Text Input -->
                    <div class="input-group-custom mb-4">
                        <label class="form-label"><i class="fas fa-keyboard me-2"></i>Type or Paste Text</label>
                        <textarea class="form-control custom-textarea" name="text_input" rows="4"
                            placeholder="Enter your content here... (Headings, paragraphs, etc.)"></textarea>
                    </div>

                    <!-- 2. File Upload -->
                    <div class="input-group-custom mb-4">
                        <label class="form-label"><i class="fas fa-cloud-upload-alt me-2"></i>Upload Files (PDF,
                            DOCX)</label>
                        <div class="upload-area" id="uploadArea">
                            <div class="upload-icon"><i class="fas fa-plus-circle"></i></div>
                            <h5>Drag & Drop or Click</h5>
                            <p class="text-muted small">Supports multiple files</p>
                            <input type="file" name="files[]" id="fileInput" multiple accept=".pdf,.docx,.txt"
                                style="display: none;">
                        </div>
                        <div id="fileList" class="file-list mt-3"></div>
                    </div>

                    <!-- Action Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg btn-block btn-process" id="processBtn">
                            <span class="spinner-border spinner-border-sm d-none me-2" role="status"
                                aria-hidden="true"></span>
                            <i class="fas fa-magic me-2"></i>Process & Merge Everything
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const form = document.getElementById('unifiedForm');
        const processBtn = document.getElementById('processBtn');

        // Click handler
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            uploadArea.classList.add('dragover');
        }

        function unhighlight(e) {
            uploadArea.classList.remove('dragover');
        }

        uploadArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
            // Also update input files
            fileInput.files = files;
        }

        fileInput.addEventListener('change', function () {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            fileList.innerHTML = '';

            if (files.length > 0) {
                const list = document.createElement('ul');
                list.className = 'list-group';

                Array.from(files).forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `
                        <span><i class="far fa-file me-2"></i>${file.name}</span>
                        <span class="badge bg-primary rounded-pill">${(file.size / 1024).toFixed(1)} KB</span>
                    `;
                    list.appendChild(li);
                });

                fileList.appendChild(list);

                // Visual feedback
                uploadArea.classList.add('border-success');
                uploadArea.style.backgroundColor = '#f0fff4';
            }
        }

        // Form submission
        // API Integration: Form submission
        form.addEventListener('submit', async function (e) {
            // 1. Stop the browser from reloading the page
            e.preventDefault(); 
            
            // 2. Show the loading spinner
            processBtn.disabled = true;
            processBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

            // 3. Pack up all the text and files from the form
            const formData = new FormData(form);

            try {
                // 4. Send the package to your new Python API!
                const response = await fetch('/api/v1/process', {
                    method: 'POST',
                    body: formData
                });

                // 5. Read the JSON response from the API
                const result = await response.json();

                if (response.ok && result.success) {
                    // SUCCESS! Redirect the user to result.html with the new filename
                    const outName = result.data.filename;
                    const count = result.data.file_count;
                    window.location.href = `/result/${outName}?count=${count}`;
                } else {
                    // FAILURE! Show the exact error message from your database manager
                    alert("Processing Failed: " + (result.error || "Unknown error"));
                    resetButton();
                }
            } catch (error) {
                // If the server crashes entirely
                console.error('Error:', error);
                alert("A network error occurred. Is the server running?");
                resetButton();
            }
        });

        // Helper function to reset the button if an error occurs
        function resetButton() {
            processBtn.disabled = false;
            processBtn.innerHTML = '<i class="fas fa-magic me-2"></i>Process & Merge Everything';
        }
    </script>
</body>

</html>
